# Static config — no templating. config-sync fetches this file verbatim.
#
# We always define 24 VLANs (vlan101–vlan124) plus vlan200. Defining VLANs a
# given host doesn't have is harmless: bind-dynamic makes dnsmasq bind each
# interface only if/when it exists, instead of failing at startup on a missing
# one. Keep this in lockstep with netplan (which also creates 24).

# Turn off DNS functionality
port=0

# Bind interfaces dynamically so absent/late VLANs don't abort startup.
bind-dynamic

# DHCP configuration — vlan101 .. vlan124
interface=vlan101
dhcp-range=vlan101,192.168.101.100,192.168.101.200,24h
interface=vlan102
dhcp-range=vlan102,192.168.102.100,192.168.102.200,24h
interface=vlan103
