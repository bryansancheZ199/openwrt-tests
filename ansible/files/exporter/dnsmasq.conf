interface=vlan106
dhcp-range=vlan106,192.168.106.100,192.168.106.200,24h
interface=vlan107
dhcp-range=vlan107,192.168.107.100,192.168.107.200,24h
interface=vlan108
dhcp-range=vlan108,192.168.108.100,192.168.108.200,24h
interface=vlan109
