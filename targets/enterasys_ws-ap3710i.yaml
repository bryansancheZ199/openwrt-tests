openwrt:
  name: Enterasys WS-AP3710i
  target: mpc85xx-p1020
  profile: enterasys_ws-ap3710i
  # Newer OpenWrt (24.10+, Linux 6.x) hangs after the kernel loads on this
  # board's ancient stock U-Boot; 23.05 (Linux 5.15) is the last that boots.
  # See https://github.com/openwrt/openwrt/issues/23112
  healthcheck_version: "23.05.5"
targets:
  main:
    features:
      - wifi
    resources:
      RemotePlace:
        name: !template "$LG_PLACE"
    drivers:
      PDUDaemonDriver: {}
      SerialDriver:
        txdelay: 0.05
      ShellDriver:
        prompt: 'root@[\w()]+:[^ ]+ '
        login_prompt: Please press Enter to activate this console.
        await_login_timeout: 15
        login_timeout: 120
        post_login_settle_time: 5
        username: root
      UBootDriver:
        autoboot: "or any other key to stop autoboot"
        interrupt: "\x08admin\n"
        prompt: "Boot \\(PRI\\)->"
        password_prompt: "password:"
        password: "new2day"
        init_commands:
          - tftp 0x1000000
        boot_command: >
          bootm

      TFTPProviderDriver: {}
      UBootTFTPStrategy: {}
      SSHDriver:
        connection_timeout: 120.0
        explicit_scp_mode: True
images:
  root: !template $LG_IMAGE
imports:
  - ../strategies/tftpstrategy.py
