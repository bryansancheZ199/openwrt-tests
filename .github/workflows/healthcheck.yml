name: Healthcheck

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      lab:
        description: "Lab (proxy) to test — empty for all"
        required: false
        type: string
      device:
        description: "Device to test — empty for all"
        required: false
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

env:
  PYTHONUNBUFFERED: "1"
  PYTEST_ADDOPTS: "--color=yes"
  LG_CONSOLE: "internal"
  RELEASE: "24.10.2"
  USER: "labgrid-dev"

jobs:
  generate-matrix:
    name: Generate labnet.yaml matrix
    runs-on: ubuntu-latest
    # Only react to /healthcheck comments on actual issues (not PRs).
    if: >
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request == null &&
       startsWith(github.event.comment.body, '/healthcheck'))
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      authorized: ${{ steps.authz.outputs.authorized }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Resolve filter & authorize commenter
        id: authz
        env:
          EVENT: ${{ github.event_name }}
          DISPATCH_LAB: ${{ inputs.lab }}
          DISPATCH_DEVICE: ${{ inputs.device }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          COMMENTER: ${{ github.event.comment.user.login }}
        run: |
          lab=""
          device=""
          authorized=true
          reason=""

          case "$EVENT" in
            workflow_dispatch)
              lab="$DISPATCH_LAB"
              device="$DISPATCH_DEVICE"
              ;;
            issue_comment)
              # Issue title format: "Healthcheck <proxy>/<device>"
              if [[ "$ISSUE_TITLE" =~ ^Healthcheck\ ([^/]+)/(.+)$ ]]; then
                lab="${BASH_REMATCH[1]}"
                device="${BASH_REMATCH[2]}"
              else
                authorized=false
                reason="issue title does not match 'Healthcheck <proxy>/<device>'"
              fi
              # Authorize: commenter must be listed in labs[<lab>].maintainers or .access
              if [ "$authorized" = "true" ]; then
                allowed=$(LAB="$lab" yq -r '(.labs[strenv(LAB)].maintainers // []) + (.labs[strenv(LAB)].access // []) | .[]' labnet.yaml | tr '[:upper:]' '[:lower:]')
                commenter_lc=$(echo "$COMMENTER" | tr '[:upper:]' '[:lower:]')
                if ! echo "$allowed" | grep -qxF -- "$commenter_lc"; then
                  authorized=false
                  reason="@$COMMENTER is neither maintainer nor access of $lab"
                fi
              fi
              ;;
          esac

          echo "lab=$lab" >> $GITHUB_OUTPUT
          echo "device=$device" >> $GITHUB_OUTPUT
          echo "authorized=$authorized" >> $GITHUB_OUTPUT
          echo "reason=$reason" >> $GITHUB_OUTPUT
          if [ "$authorized" != "true" ]; then
            echo "::warning::not authorized: $reason"
          fi

      - name: React to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v9
        with:
          script: |
            const authorized = '${{ steps.authz.outputs.authorized }}' === 'true';
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: authorized ? 'rocket' : '-1',
            });

      - name: Generate matrix
        id: set-matrix
        if: steps.authz.outputs.authorized == 'true'
        env:
          FILTER_LAB: ${{ steps.authz.outputs.lab }}
          FILTER_DEVICE: ${{ steps.authz.outputs.device }}
        run: |
          # Use pipe because of this bug
          # https://github.com/mikefarah/yq/issues/2454
          devices_meta=$(
            for f in targets/*.yaml; do
              head -1 "$f" | grep -q '^openwrt:' || continue
              device=$(basename "$f" .yaml)
              so=$(yq -r '.openwrt.snapshots_only // false' "$f")
              jq -n --arg d "$device" --argjson so "$so" '{($d): {snapshots_only: $so}}'
            done | jq -s 'add'
          )

          matrix=$(yq -o=json labnet.yaml | jq \
            --argjson devices "$devices_meta" \
            --arg filter_lab "$FILTER_LAB" \
            --arg filter_device "$FILTER_DEVICE" '
            .labs as $labs |
            ($labs | to_entries) | map(
              .key as $lab |
              $labs[$lab].devices | map(
                select($devices[.] != null and $devices[.].snapshots_only != true) |
                {
                  "device": .,
                  "proxy": $labs[$lab].proxy,
                  "maintainers": $labs[$lab].maintainers,
                  "snapshots_only": $devices[.].snapshots_only
                }
              )
            )
            | flatten
            | map(select(
                ($filter_lab == "" or .proxy == $filter_lab) and
                ($filter_device == "" or .device == $filter_device)
              ))
          ')
          echo "matrix=$(echo "$matrix" | jq -c '.')" >> $GITHUB_OUTPUT

  test-real:
    name: ${{ matrix.device }} (${{ matrix.proxy }})
    needs: generate-matrix
    if: >
      needs.generate-matrix.outputs.authorized == 'true' &&
      needs.generate-matrix.outputs.matrix != '[]' &&
      needs.generate-matrix.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install nmap
        run: sudo apt-get -y install nmap

      - name: Setup SSH connection to coordinator
        env:
          LABGRID_SSH_KEY: ${{ secrets.LABGRID_SSH_KEY }}
          COORDINATOR_HOSTKEY: ${{ secrets.COORDINATOR_HOSTKEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$LABGRID_SSH_KEY" > ~/.ssh/labgrid
          chmod 600 ~/.ssh/labgrid

          cat > ~/.ssh/config << 'SSHEOF'
          Host coordinator
            HostName ${{ secrets.COORDINATOR_HOST }}
            Port ${{ secrets.COORDINATOR_PORT }}
            User labgrid-dev
            IdentityFile ~/.ssh/labgrid

          Host labgrid-*
            User labgrid-dev
            IdentityFile ~/.ssh/labgrid
            ProxyJump coordinator
          SSHEOF

          echo "[${{ secrets.COORDINATOR_HOST }}]:${{ secrets.COORDINATOR_PORT }} $COORDINATOR_HOSTKEY" >> ~/.ssh/known_hosts
          yq -r '.labs | to_entries[] | "\(.key) \(.value.hostkey)"' labnet.yaml >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Set environment
        env:
          DEVICE: ${{ matrix.device }}
        run: |
          # workaround until 24.10.x is fixed on tplink_tl-wr1043nd-v3
          if [ "$DEVICE" = "tplink_tl-wr1043nd-v3" ]; then
            export RELEASE=23.05.5
            echo "RELEASE=${RELEASE}" >> $GITHUB_ENV
          fi

          target=$(yq -r '.openwrt.target' targets/$DEVICE.yaml)
          profile=$(yq -r '.openwrt.profile' targets/$DEVICE.yaml)
          image_type=$(yq -r '.openwrt.image.type // "kernel"' targets/$DEVICE.yaml)
          image_fs=$(yq -r '.openwrt.image.filesystem // ""' targets/$DEVICE.yaml)

          upstream_url="https://mirror-03.infra.openwrt.org/releases/${RELEASE}/targets"
          profiles_json=$(curl -sf "$upstream_url/${target/-/\/}/profiles.json")

          if [ -n "$image_fs" ]; then
            firmware_name=$(echo "$profiles_json" | jq -r --arg p "$profile" --arg t "$image_type" --arg fs "$image_fs" \
              '.profiles[$p].images[]? | select(.type == $t and .filesystem == $fs) | .name' | head -n1)
          else
            firmware_name=$(echo "$profiles_json" | jq -r --arg p "$profile" --arg t "$image_type" \
              '.profiles[$p].images[]? | select(.type == $t) | .name' | head -n1)
          fi

          mkdir -p $GITHUB_WORKSPACE/tftp/$DEVICE
          wget -q "$upstream_url/${target/-/\/}/$firmware_name" \
            --output-document "$GITHUB_WORKSPACE/tftp/$DEVICE/$firmware_name"
          (cd $GITHUB_WORKSPACE/tftp/ && gzip -df $DEVICE/$firmware_name) || true

          FIRMWARE_VERSION=$(echo "$profiles_json" | jq -r '.version_code')
          echo "FIRMWARE_VERSION=$FIRMWARE_VERSION" >> $GITHUB_ENV
          echo "LG_IMAGE=$GITHUB_WORKSPACE/tftp/$DEVICE/${firmware_name/.gz/}" >> $GITHUB_ENV
          echo "LG_PROXY=${{ matrix.proxy }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Wait for free device
        run: |
          eval $(uv run labgrid-client reserve --wait --shell device=${{ matrix.device }})
          echo "LG_TOKEN=$LG_TOKEN" >> $GITHUB_ENV
          echo "LG_PLACE=+" >> $GITHUB_ENV
          uv run labgrid-client -p +$LG_TOKEN lock
          echo "LG_ENV=targets/${{ matrix.device }}.yaml" >> $GITHUB_ENV

      - name: Run test
        id: test
        run: |
          uv run pytest tests/test_base.py::test_shell tests/test_base.py::test_ssh -v \
            --lg-log \
            --lg-colored-steps \
            --log-cli-level=CONSOLE

      - name: Poweroff and unlock device
        if: always()
        run: |
          uv run labgrid-client power off || true
          uv run labgrid-client unlock

      - name: Upload console logs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: console-${{ matrix.proxy }}-${{ matrix.device }}
          path: console_*

      - name: Handle test result
        uses: actions/github-script@v9
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueTitle = "Healthcheck ${{ matrix.proxy }}/${{ matrix.device }}";
            const runUrl = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}";
            const isSuccess = "${{ job.status }}" === "success";
            const maintainers = ${{ toJSON(matrix.maintainers) }}.map(m => '@' + m).join(', ');
            const triggeringIssue = context.eventName === 'issue_comment'
              ? context.payload.issue.number : null;

            const failureBody = `
              ### ❌ Healthcheck Failed

              The automated healthcheck for:

              - **Proxy**: \`${{ matrix.proxy }}\`
              - **Device**: \`${{ matrix.device }}\`
              - **Maintainers**: ${maintainers}

              has **failed**. Please review the logs and investigate the issue.

              🔗 [View the full workflow run](${runUrl})
            `.trim();

            // Fetch existing issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100,
            });

            let testIssue = issues.data.find(issue =>
              issue.title === issueTitle &&
              issue.user.type === "Bot"
            );

            if (isSuccess) {
              if (testIssue) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: testIssue.number,
                  state: "closed",
                });
              }
              console.log("Closed issue as test passed.");
            } else {
              if (testIssue) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: testIssue.number,
                  state: "open",
                  body: failureBody,
                  labels: ["healthcheck"],
                });
                console.log("Reopened existing issue due to test failure.");
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issueTitle,
                  body: failureBody,
                  labels: ["healthcheck"],
                });
                console.log("Created new issue due to test failure.");
              }
            }

            // If triggered from a /healthcheck comment, post the result there too.
            if (triggeringIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: triggeringIssue,
                body: `Healthcheck for \`${{ matrix.proxy }}/${{ matrix.device }}\` ${isSuccess ? '✅ passed' : '❌ failed'} — [run log](${runUrl}).`,
              });
            }
