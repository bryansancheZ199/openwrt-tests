openwrt:
  name: gemtek_w1700k-ubi
  target: airoha-an7581
  profile: gemtek_w1700k-ubi
targets:
  main:
    features:
      - wan_port
      - lan_port
    resources:
      RemotePlace:
        name: !template "$LG_PLACE"
    drivers:
      - PDUDaemonDriver: {}
      - TFTPProviderDriver: {}
      - SerialDriver:
          txdelay: 0.01
      - UBootDriver:
          boot_expression: "Hit any key to stop autoboot:"
          interrupt: "\n"
          prompt: "ECNT>"
          init_commands:
            - setenv ipaddr "192.168.$vlan107.2"
            - setenv serverip "$address"
            - tftpboot
          boot_command: bootm $loadaddr
      - ShellDriver:
          prompt: 'root@[\w()]+:[^ ]+ '
          login_prompt: Please press Enter to activate this console.
          await_login_timeout: 15
          login_timeout: 120
          post_login_settle_time: 5
          username: root
      - UBootTFTPStrategy: {}
      - SSHDriver:
          connection_timeout: 120.0
          explicit_scp_mode: True
images:
  root: !template $LG_IMAGE
imports:
  - ../strategies/tftpstrategy.py
