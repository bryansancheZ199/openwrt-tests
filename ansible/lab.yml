- hosts: labs
  become: true
  vars:
    labnet: "{{ lookup('file', '../labnet.yaml') | from_yaml }}"
  tasks:
    - name: Set hostname
      hostname:
        name: "{{ inventory_hostname }}"

    - name: Set /etc/hosts
      lineinfile:
        path: /etc/hosts
        regexp: "^127.0.0.1"
        line: "127.0.0.1 localhost"
        state: present

    - name: Create a user account called labgrid-dev
      user:
        name: labgrid-dev
        state: present
        shell: /bin/bash
        home: /home/labgrid-dev
        create_home: yes
        append: true
        groups:
          - dialout
          - plugdev

    - name: Add SSH keys to labgrid-dev from GitHub
      authorized_key:
        user: labgrid-dev
        state: present
        key: "{{ lookup('url', 'https://github.com/' + item + '.keys', split_lines=false) }}"
        comment: "{{ item }}"
      loop: "{{ ((labnet.labs[inventory_hostname].maintainers | default([])) + (labnet.labs[inventory_hostname].access | default([]))) | unique | list }}"

    - name: Set /etc/hosts
      lineinfile:
        path: /etc/hosts
        regexp: "^127.0.1.1"
        line: "127.0.1.1 {{ inventory_hostname }}"
        state: present

    - name: Add public SSH key of coordinator
      authorized_key:
        user: "labgrid-dev"
        key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIP0ZVlD9TmfAXL53Vq7V9WKE3KPomOa1jINyflrPWAlJ"

    - name: Generate SSH key pair for labgrid
      community.crypto.openssh_keypair:
        path: /home/labgrid-dev/.ssh/labgrid
        type: ed25519
        comment: labgrid
        state: present
        owner: labgrid-dev
        group: labgrid-dev

      register: labgrid_key

    - name: Add public SSH key of labgrid
      authorized_key:
        user: "labgrid-dev"
        key: "{{ labgrid_key.public_key }}"
        state: present

    - name: Install required packages
      apt:
        name:
          - pipx
          - microcom
          - ser2net
          - rsync
          - socat
          - iptables
          - iptables-persistent
          - git
          - sudo
          - pkg-config
          - libsystemd-dev
          - build-essential
          - python3-dev
        state: present
        update_cache: yes

    - name: Create pipx folder
      file:
        path: /opt/pipx/
        state: directory
        owner: "root"
        group: "root"
        mode: "0755"

    - name: Install labgrid packages
      community.general.pipx:
        name: labgrid
        source: git+https://github.com/aparcar/labgrid.git@aparcar/staging
        state: latest
      environment:
        PIPX_HOME: /opt/pipx/
        PIPX_BIN_DIR: /usr/local/bin
      notify:
        - Restart labgrid-exporter
        - Restart labgrid-coordinator


    - name: Install usbsdmux packages
      community.general.pipx:
        name: usbsdmux
        state: latest
      environment:
        PIPX_HOME: /opt/pipx/
        PIPX_BIN_DIR: /usr/local/bin

    - name: Create labgrid folder
      file:
        path: /etc/labgrid
        state: directory

    - name: Create tftp folder
      file:
        path: /srv/tftp/
        state: directory
        owner: "labgrid-dev"
        group: "labgrid-dev"
        recurse: yes
        mode: "0755"


    - name: Build TFTP device instance mapping
      set_fact:
        tftp_device_instances: "{{ tftp_device_instances | default([]) + [{
          'device': item,
          'instances': hostvars[inventory_hostname]['labs'][inventory_hostname].get('device_instances', {}).get(item, [item])
        }] }}"
      loop: "{{ hostvars[inventory_hostname]['labs'][inventory_hostname]['devices'] }}"
      tags:
        - export

    - name: Create tftp subfolders (one per device instance)
      file:
        path: /srv/tftp/{{ item[1] }}
        state: directory
        owner: "labgrid-dev"
        group: "labgrid-dev"
        mode: "0755"
      loop: "{{ tftp_device_instances | subelements('instances') }}"
      loop_control:
        label: "{{ item[1] }}"
      tags:
        - export

    - name: Copy exporter configuration
      template:
        src: files/exporter/{{ inventory_hostname }}/exporter.yaml
        dest: /etc/labgrid/exporter.yaml
      notify:
        - Restart labgrid-exporter
      tags:
        - export

    - name: Setup pdudaemon
      block:
        - name: Install pdudaemon via pipx
          community.general.pipx:
            name: pdudaemon
            source: git+https://github.com/pdudaemon/pdudaemon.git@1.1.1
            state: latest
            force: true
          environment:
            PIPX_HOME: /opt/pipx/
            PIPX_BIN_DIR: /usr/local/bin
          become: true

        - name: Create pdudaemon directory
          ansible.builtin.file:
            path: /etc/pdudaemon
            state: directory
            mode: 0755

        - name: Deploy pdudaemon systemd unit
          ansible.builtin.template:
            src: files/exporter/pdudaemon.service
            dest: /etc/systemd/system/pdudaemon.service

        - name: Stat host specific pdudaemon configuration
          ansible.builtin.stat:
            path: files/exporter/{{ inventory_hostname }}/pdudaemon.conf
          register: host_specific_pdudaemon_conf
          delegate_to: localhost
          become: false

        - name: Configure pdudaemon using host specific config
          template:
            src: files/exporter/{{ inventory_hostname }}/pdudaemon.conf
            dest: /etc/pdudaemon/pdudaemon.conf
          notify:
            - Restart pdudaemon
          when: host_specific_pdudaemon_conf.stat.exists | default(false)

        - name: Otherwise use general config
          template:
            src: files/exporter/pdudaemon.conf
            dest: /etc/pdudaemon/pdudaemon.conf
          notify:
            - Restart pdudaemon
          when: not (host_specific_pdudaemon_conf.stat.exists | default(false))

        - name: Start and enable pdudaemon
          ansible.builtin.systemd_service:
            name: pdudaemon
            state: started
            enabled: yes
            daemon_reload: yes

    - name: Install dnsmasq
      apt:
        name:
          - dnsmasq
        state: present
        update_cache: yes

      notify:
        - Restart dnsmasq

    - name: Configure network with netplan
      block:
        - name: Stat host specific netplan configuration
          ansible.builtin.stat:
            path: files/exporter/{{ inventory_hostname }}/netplan.yaml
          register: host_specific_netplan_conf
          delegate_to: localhost
          become: false

        - name: Configure netplan using host specific config
          ansible.builtin.template:
            src: files/exporter/{{ inventory_hostname }}/netplan.yaml
            dest: /etc/netplan/labnet.yaml
            mode: 0600
            owner: root
            group: root
          when: host_specific_netplan_conf.stat.exists | default(false)

        - name: Configure netplan using default config
          template:
            src: files/exporter/netplan.yaml
            dest: /etc/netplan/labnet.yaml
          notify:
            - Apply netplan
          when: not (host_specific_netplan_conf.stat.exists | default(false))

    - name: Stat host specific dnsmasq configuration
      ansible.builtin.stat:
        path: files/exporter/{{ inventory_hostname }}/dnsmasq.conf
      register: host_specific_dnsmasq_conf
      delegate_to: localhost
      become: false

    - name: Configure dnsmasq using host specific config
      template:
        src: files/exporter/{{ inventory_hostname }}/dnsmasq.conf
        dest: /etc/dnsmasq.conf

      notify:
        - Restart dnsmasq
      when: host_specific_dnsmasq_conf.stat.exists | default(false)

    - name: Configure dnsmasq using default config
      template:
        src: files/exporter/dnsmasq.conf
        dest: /etc/dnsmasq.conf
      notify:
        - Restart dnsmasq
      when: not (host_specific_dnsmasq_conf.stat.exists | default(false))

    - name: Start and enable dnsmasq
      service:
        name: dnsmasq
        state: started
        enabled: yes

    - name: Copy labgrid-coordinator.service
      template:
        src: files/coordinator/labgrid-coordinator.service
        dest: /etc/systemd/system/labgrid-coordinator.service
      notify:
        - Restart labgrid-coordinator

    - name: Add places.yaml based on labnet.yaml
      template:
        src: files/coordinator/places.yaml.j2
        dest: /etc/labgrid/places.yaml
        mode: "0755"
        owner: labgrid-dev
        group: labgrid-dev
      notify:
        - Restart labgrid-coordinator
      tags:
        - export

    - name: Start and enable labgrid-coordinator
      service:
        name: labgrid-coordinator
        state: started
        enabled: yes

    - name: Copy labgrid-exporter.service
      template:
        src: files/exporter/labgrid-exporter.service
        dest: /etc/systemd/system/labgrid-exporter.service
      notify:
        - Restart labgrid-exporter

    - name: Start and enable labgrid-exporter
      service:
        name: labgrid-exporter
        state: started
        enabled: yes

    - name: Add labgrid-bound-connect to sudoers
      lineinfile:
        path: /etc/sudoers
        line: "ALL ALL = NOPASSWD: /usr/local/sbin/labgrid-bound-connect"
        validate: "visudo -cf %s"

    - name: Install labgrid-bound-connect
      copy:
        src: files/labgrid-bound-connect
        dest: /usr/local/sbin/labgrid-bound-connect
        mode: "0755"

    - name: Create /var/cache/labgrid/labgrid-dev
      file:
        path: /var/cache/labgrid/labgrid-dev
        state: directory
        owner: "labgrid-dev"
        group: "labgrid-dev"
        recurse: yes
        mode: "0755"

    - name: Add cronjob to clean old cache files
      cron:
        name: "Clean labgrid cache files older than 7 days"
        minute: "0"
        hour: "2"
        job: "find /var/cache/labgrid -type f -mtime +7 -delete"
        user: "labgrid-dev"

    - name: Enable IP forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        sysctl_set: yes
        reload: yes

    - name: Make IP forwarding persistent
      copy:
        content: "net.ipv4.ip_forward = 1"
        dest: /etc/sysctl.d/99-ip-forward.conf
        mode: "0644"

    - name: Add udev rules for USB-SD-Mux
      copy:
        src: files/exporter/usbsdmux.rules
        dest: /etc/udev/rules.d/99-usbsdmux.rules
        mode: "0644"
      notify: Reload udev rules
      tags:
        - udev

    - name: Build and install CH348 USB-octal-serial kernel module
      when: ch348_module_enabled | default(false) | bool
      vars:
        ch348_module_repo: "{{ ch348_module_repo_url | default('https://github.com/WCHSoftGroup/ch348ser_linux.git') }}"
        ch348_module_version: "{{ ch348_module_ref | default('main') }}"
        ch348_source_dir: /usr/src/ch348
        ch348_module_path: "/lib/modules/{{ ansible_kernel }}/kernel/drivers/usb/serial/ch348.ko"
      tags:
        - ch348
      block:
        - name: Install CH348 build dependencies
          apt:
            name:
              - dwarves
              - "linux-headers-{{ ansible_kernel }}"
            state: present

        - name: Clone CH348 driver source
          ansible.builtin.git:
            repo: "{{ ch348_module_repo }}"
            dest: "{{ ch348_source_dir }}"
            version: "{{ ch348_module_version }}"
            update: false
          register: ch348_clone

        - name: Check whether ch348.ko is already installed
          ansible.builtin.stat:
            path: "{{ ch348_module_path }}"
          register: ch348_installed

        - name: Build CH348 kernel module
          ansible.builtin.command:
            cmd: make
            chdir: "{{ ch348_source_dir }}"
          register: ch348_build
          when: ch348_clone is changed or not ch348_installed.stat.exists
          changed_when: ch348_build.rc == 0

        - name: Install ch348.ko into kernel modules tree
          ansible.builtin.copy:
            src: "{{ ch348_source_dir }}/ch348.ko"
            dest: "{{ ch348_module_path }}"
            remote_src: true
            mode: "0644"
          register: ch348_install
          when: ch348_build is changed

        - name: Refresh module dependencies
          ansible.builtin.command: depmod -a
          when: ch348_install is changed

        - name: Autoload ch348 at boot
          ansible.builtin.copy:
            content: "ch348\n"
            dest: /etc/modules-load.d/ch348.conf
            mode: "0644"

        - name: Load ch348 module now
          community.general.modprobe:
            name: ch348
            state: present

  handlers:
    - name: Restart labgrid-exporter
      systemd:
        daemon_reload: yes
        name: labgrid-exporter
        state: restarted

    - name: Restart labgrid-coordinator
      systemd:
        daemon_reload: yes
        name: labgrid-coordinator
        state: restarted

    - name: Restart pdudaemon
      systemd:
        daemon_reload: yes
        name: pdudaemon
        state: restarted

    - name: Restart dnsmasq
      systemd:
        daemon_reload: yes
        name: dnsmasq
        state: restarted

    - name: Reload udev rules
      command: udevadm control --reload-rules

    - name: Apply netplan
      ansible.builtin.command:
        cmd: netplan apply
